[build]
  base = "child-safety-petition"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "child-safety-petition/netlify/functions"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
